services:
  - type: web
    name: tariffiq-api
    env: python
    region: singapore # Closest to India for better performance
    plan: free
    numInstances: 1
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GROQ_API_KEY
        sync: true
      - key: TAVILY_API_KEY
        sync: true
      - key: NEWS_API_KEY
        sync: true
      - key: TOKENIZERS_PARALLELISM
        value: false
